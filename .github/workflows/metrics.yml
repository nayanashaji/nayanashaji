name: Metrics

on:
  workflow_dispatch:

jobs:
    github-metrics:
        runs-on: ubuntu-latest
        
        steps:
          - uses: lowlighter/metrics@latest
            with:
                token: ${{ secrets.METRICS_TOKEN }}
                
                user: nayanashaji
                filename: github-metrics.svg
                
                base: header, metadata
                
                plugin_calendar: yes
                plugin_leetcode: yes
                plugin_leetcode_user: nayanashaji

                plugin_activity: yes
                plugin_activity_limit: 5
                plugin_activity_timestamps: yes

                plugin_repositories: yes
                plugin_repositories_featured: gabsgj/Stampede-Predictor
