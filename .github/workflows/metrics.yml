name: Metrics

on:
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
  
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
    
          user: nayanashaji
          filename: github-metrics.svg
    
          plugin_calendar: yes
          plugin_repositories: yes
          plugin_repositories_pinned: 6
